name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate config.dart
        run: |
          cat > lib/config.dart << EOF
          class AppConfig {
            static const String appId = '${{ secrets.APP_ID }}';
            static const String secretKey = '${{ secrets.SECRET_KEY }}';
          }
          EOF

      - name: Setup release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > android/key.jks
          echo "storeFile=../key.jks" > android/key.properties
          echo "keyAlias=release" >> android/key.properties
          echo "storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> android/key.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings > analyze.log 2>&1
          status=$?
          cat analyze.log
          while IFS= read -r line; do
            echo "::error::${line}"
          done < analyze.log
          exit $status

      - name: Upload analyzer log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-log
          path: analyze.log

      - name: Run tests
        run: flutter test

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
